# OpenCozmo API Configuration
# Environment variables override any value here.
# See ARCHITECTURE.md for the full reference.

robot:
  wifi_ssid: ''
  connect_timeout_s: 10
  turn_calibration_factor: 2.14  # Calibration factor for turn accuracy (adjust if robot doesn't turn the right angle)
server:
  host: 0.0.0.0
  port: 8765
  mdns_name: opencozmo
camera:
  enabled: false
  fps: 15
  quality: 70
sensors:
  state_event_log_hz: 1.0
  auto_broadcast_state: false
llm:
  url: https://api.mistral.ai/v1
  model: mistral-small
  api_key: ''
logging:
  level: DEBUG
  output_dir: logs
